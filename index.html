<!doctype html>
<html lang="es">
  <head>
    <!-- Configuración básica de la página -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BambuPOS - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <main class="container">
      <!-- Formulario -->
      <section class="login-form">
        <!-- Logo -->
        <img src="images/logo.png" alt="Logo BambuPOS" class="logo" />
        <!-- Título -->
        <h1>BambuPOS</h1>
        <p class="subtitle">Sistema de Gestión Empresarial</p>
        <!-- Formulario -->
        <form>
          <!-- Usuario -->
          <div class="form-group">
            <label for="username"> Usuario </label>
            <input type="text" id="username" placeholder="Ingrese su usuario" />
          </div>
          <!-- Contraseña -->
          <div class="form-group">
            <label for="password"> Contraseña </label>
            <input
              type="password"
              id="password"
              placeholder="Ingrese su contraseña"
            />
          </div>

          <!-- Recordar usuario -->
          <div class="remember">
            <label>
              <input type="checkbox" />
              Recordar usuario
            </label>
          </div>

          <!-- Botón -->
          <!--
                    En futuras clases este botón será reemplazado
                    por JavaScript y posteriormente Backend.

                    De momento utilizamos un enlace para simular
                    el inicio de sesión.
                -->

          <a href="./paginas/dashboard.html" class="login-button"> Iniciar Sesión </a>
          <!-- Recuperar contraseña -->
          <a href="#" class="forgot-password"> ¿Olvidó su contraseña? </a>
        </form>
      </section>
    </main>
  </body>
</html>
